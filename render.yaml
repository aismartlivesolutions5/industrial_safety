services:
  - type: web
    name: bulk-drug-safety-api
    env: docker
    dockerfilePath: Dataset_generation_codes_Hackathon/Dockerfile
    dockerContext: Dataset_generation_codes_Hackathon
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
    plan: starter            # 512 MB RAM — sufficient for the trimmed 14-day dataset (~50 MB CSV)
