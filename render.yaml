services:
  - type: web
    name: bulk-drug-safety-api
    env: image
    image:
      url: docker.io/YOUR_DOCKER_USERNAME/bulk-drug-safety:latest
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard — never commit the real key
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: DEBUG
        value: "false"
    healthCheckPath: /health
    plan: standard           # requires 2 GB RAM — the 311 MB MASTER CSV needs ~1-2 GB in pandas
